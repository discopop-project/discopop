name: Publish discopop-hotspot-detection to PyPI

on:
  push:
    tags:
      - "hotspot_detection_v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish discopop-hotspot-detection
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # IMPORTANT: this permission is mandatory for Trusted Publishing
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install prerequisites
        run: |
          sudo apt update
          sudo apt install clang-20

      - name: Build discopop-hotspot-detection
        run: pip install build && python -m build --sdist hotspot_detection/ -v

      - name: Publish discopop-hotspot-detection to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: hotspot_detection/dist/
