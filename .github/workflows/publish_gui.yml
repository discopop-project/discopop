name: Publish discopop-gui to PyPI

on:
  push:
    tags:
      - "gui_v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish discopop-gui
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Build discopop-gui
        run: pip install build && python -m build GUI/

      - name: Publish discopop-gui to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: gui/dist/
