name: "DiscoPoP CI"
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "**"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  execute_license_check:
    runs-on: self-hosted
    name: License check
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: "Github SHA"
        run: |
          echo "Hello from: ${{ github.sha }}"

      - name: "Check all files for DiscoPoP License tag"
        run: |
          ./scripts/dev/check-license.sh $(find . -type f)

  create_matrix:
    runs-on: self-hosted
    name: Select matrix
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Select build matrix
        id: set_matrix
        shell: bash
        run: |
          matrix='{"include":[
            {"id":"ubuntu-24-04", "base_image":"ubuntu:24.04"},
            {"id":"debian-12", "base_image":"debian:12"}
          ]}'

          if [[ "${{ github.event_name }}" = "pull_request" && "${{ github.base_ref }}" != "master" ]]; then
            matrix='{"include":[
              {"id":"ubuntu-24-04", "base_image":"ubuntu:24.04"}
            ]}'          
          fi

          {
            echo "matrix<<END"
            echo "$matrix"
            echo "END"
          } >> "$GITHUB_OUTPUT"

  build_and_test_matrix:
    runs-on: self-hosted
    name: "Build & test (${{ matrix.id }}) with image: (${{ matrix.base_image }}) "
    needs: [execute_license_check, create_matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.create_matrix.outputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build docker image discopop_ci_base-${{ matrix.id }}
        run: |
          docker build \
            -f .github/workflows/Dockerfile_ci_base \
            -t discopop_ci_base-${{ matrix.id }} \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            .

      - name: Build docker image discopop_ci_${{ github.sha }}-${{ matrix.id }}
        run: |
          docker build \
            -f .github/workflows/Dockerfile_ci \
            -t discopop_ci_${{ github.sha }}-${{ matrix.id }} \
            --build-arg BASE_IMAGE_TAG=-${{ matrix.id }} \
            --no-cache \
            .

      - name: "Run MyPy Type Checker - DiscoPoP Explorer"
        run: |
          docker run --rm discopop_ci_${{ github.sha }}-${{ matrix.id }} \
            python -m mypy --config-file=mypy.ini -p discopop_explorer

      - name: "Run MyPy Type Checker - DiscoPoP Library"
        run: |
          docker run --rm discopop_ci_${{ github.sha }}-${{ matrix.id }} \
            python -m mypy --config-file=mypy.ini -p discopop_library

      - name: "Check formatting of DiscoPoP Explorer"
        run: |
          docker run --rm discopop_ci_${{ github.sha }}-${{ matrix.id }} \
            python -m black -l 120 --check discopop_explorer

      - name: "Check formatting of DiscoPoP Library"
        run: |
          docker run --rm discopop_ci_${{ github.sha }}-${{ matrix.id }} \
            python -m black -l 120 --check discopop_library

      - name: Execute C++ unit tests
        run: |
          docker run --rm discopop_ci_${{ github.sha }}-${{ matrix.id }} \
            build/test/unit_tests/DiscoPoP_UT

      - name: Profiler gold standard tests (regular)
        run: |
          docker run -e DP_TEST_PROFILER_CONFIG="build_regular" --rm discopop_ci_${{ github.sha }}-${{ matrix.id }} \
            python -m unittest -v -k *test.profiler.*

      - name: Profiler gold standard tests (hybrid)
        run: |
          docker run -e DP_TEST_PROFILER_CONFIG="build_hybrid" --rm discopop_ci_${{ github.sha }}-${{ matrix.id }} \
            python -m unittest -v -k *test.profiler.*

      - name: Python end-to-end-tests
        run: |
          docker run --rm discopop_ci_${{ github.sha }}-${{ matrix.id }} \
            python -m unittest -v -k *.end_to_end.*

  checks_successful:
    runs-on: self-hosted
    name: Checks successful
    needs: build_and_test_matrix
    steps:
      - name: Report
        run: |
          echo "All checks successful!"

  cleanup:
    runs-on: self-hosted
    name: "Cleanup (${{ matrix.id }})"
    if: always()
    needs: [create_matrix, build_and_test_matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.create_matrix.outputs.matrix) }}
    steps:
      - name: Cleanup temporary docker images
        run: |
          # CI image
          if [ ! -z "$(docker images -q discopop_ci_${{ github.sha }}-${{ matrix.id }} 2> /dev/null)" ]; then
            docker image rm discopop_ci_${{ github.sha }}-${{ matrix.id }}
          fi

          # CI base image
          # Commented for efficiency in ci running by caching the base images
          # if [ ! -z "$(docker images -q discopop_ci_base-${{ matrix.id }} 2> /dev/null)" ]; then
          #   docker image rm discopop_ci_base-${{ matrix.id }}
          # fi