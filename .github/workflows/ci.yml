name: "DiscoPoP CI"
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  wip_install_shared_dependencies:
    runs-on: self-hosted
    name: Test install dependencies
    steps:

      - name: cleanup
        run: rm -r ../shared/bin/third_party

      - name: setup shared directory
        run: mkdir -p ../shared/bin

      - name: setup llvm 11.1.0
        run: |
          mkdir -p ../shared/third_party

          if [ ! -d "../shared/third_party" ]; then
            echo "../shared/third_party does not exist."
            mkdir -p ../shared/third_party
          fi

          if [ -d "../shared/third_party" ]; then
            echo "../shared/third_party does exist now."
          fi

          echo "Downloading llvm 11.1.0"


#cd third_party
#wget https://github.com/llvm/llvm-project/releases/download/llvmorg-11.1.0/clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-20.10.tar.xz
#tar -xvf clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-20.10.tar.xz
#mv clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-20.10 llvm-11.1.0
#rm clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-20.10.tar.xz
#LLVM_DIR=${DP_BUILD_DIR}/third_party/llvm-11.1.0




  wip_test:
    runs-on: self-hosted
    name: Test cd
    needs: wip_install_shared_dependencies
    steps:
      - name: echo pwd
        run: |
          cd
          pwd
