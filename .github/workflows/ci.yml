name: "DiscoPoP CI"
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  wip_install_shared_dependencies:
    runs-on: self-hosted
    name: Test install dependencies
    steps:

      - name: setup shared directory
        run: |
          mkdir -p ../shared/bin
          mkdir -p ../shared/third_party

      - name: setup llvm 11.1.0
        run: |
          CURDIR=$(pwd)
          echo "CURDIR: ${CURDIR}"
          if [ ! -f "../shared/third_party/clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-20.10.tar.xz" ]; then
            echo "download."
          fi

          echo "Downloading llvm 11.1.0"

      - name: echo pwd
        run: pwd


