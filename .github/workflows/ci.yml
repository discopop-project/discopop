name: "DiscoPoP CI"
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  wip_install_shared_dependencies:
    runs-on: self-hosted
    name: Test install dependencies
    steps:
      - name: show pwd
        run: pwd

      - name: echo PATH
        run: echo $PATH

      - name: modify PATH
        run: export PATH=$PATH:$(pwd)/../shared/bin

# wip_setup_path

  test_install_dependencies:
    runs-on: self-hosted
    name: Test install dependencies
    needs: wip_install_shared_dependencies
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: show pwd
        run: pwd

      - name: show ls
        run: ls

      - name: echo path
        run: echo $PATH

      - name: echo 1
        run: echo "1" >> test.txt

      - name: read test.txt
        run: cat test.txt

      - name: read shared
        run: cat ../shared_doc.txt

      - name: overwrite shared
        run: echo " was here" >> ../shared_doc.txt
