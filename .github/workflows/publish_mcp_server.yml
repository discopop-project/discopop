name: Publish discopop-mcp-server to PyPI

on:
  push:
    tags:
      - "mcp_server_v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish discopop-mcp-server
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      # IMPORTANT: this permission is mandatory for Trusted Publishing
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Build discopop-mcp-server
        run: pip install build && python -m build mcp_server/

      - name: Publish discopop-mcp-server to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp_server/dist/
