name: Publish discopop-library to PyPI

on:
  push:
    tags:
      - "library_v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish discopop-library
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Build discopop-library
        run: pip install build && python -m build library/

      - name: Publish discopop-library to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: library/dist/
